<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="postGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d2b27"/>
      <stop offset="60%"  stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>

    <!-- Radial glow behind logo -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0f766e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0"/>
    </radialGradient>

    <!-- Logo circle background -->
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a5c57"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>

    <!-- Dot grid pattern -->
    <pattern id="dotGridPost" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.5" fill="white" opacity="0.04"/>
    </pattern>

    <!-- Glow filter for arc -->
    <filter id="arcGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for content area -->
    <clipPath id="contentClip">
      <rect x="0" y="0" width="1200" height="570"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#postGrad)"/>

  <!-- Dot grid overlay -->
  <rect width="1200" height="570" fill="url(#dotGridPost)" clip-path="url(#contentClip)"/>

  <!-- Large decorative circle top-right -->
  <circle cx="1080" cy="80"  r="150" fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.10"/>
  <circle cx="1080" cy="80"  r="110" fill="none" stroke="#5eead4" stroke-width="1"   opacity="0.07"/>

  <!-- Small accent circles scattered -->
  <circle cx="50"   cy="520" r="60"  fill="none" stroke="#5eead4" stroke-width="1"   opacity="0.07"/>
  <circle cx="620"  cy="540" r="35"  fill="none" stroke="#5eead4" stroke-width="1"   opacity="0.06"/>
  <circle cx="300"  cy="25"  r="28"  fill="none" stroke="#5eead4" stroke-width="1"   opacity="0.06"/>
  <circle cx="1180" cy="430" r="70"  fill="none" stroke="#5eead4" stroke-width="1"   opacity="0.05"/>

  <!-- Vertical divider line between left and right -->
  <line x1="660" y1="60" x2="660" y2="540" stroke="#5eead4" stroke-width="0.5" opacity="0.15"/>

  <!-- ================================================================ -->
  <!--  LEFT CONTENT (x starting at 70)                                  -->
  <!-- ================================================================ -->

  <!-- "NUEVO" tag pill -->
  <rect x="70" y="88" width="80" height="30" rx="15" fill="#5eead4"/>
  <text x="110" y="108"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-weight="700"
        font-size="14"
        fill="#0d2b27"
        text-anchor="middle">NUEVO</text>

  <!-- "Gestiona tu empresa" -->
  <text x="70" y="165"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-weight="700"
        font-size="52"
        fill="white"
        letter-spacing="-1">Gestiona tu empresa</text>

  <!-- "con Harmoni ERP" (cyan) -->
  <text x="70" y="225"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-weight="700"
        font-size="52"
        fill="#5eead4"
        letter-spacing="-1">con Harmoni ERP</text>

  <!-- Divider accent line -->
  <rect x="70" y="252" width="60" height="3" rx="1.5" fill="#5eead4"/>

  <!-- ---- Feature list ---- -->
  <!-- Feature 1 — y=285 -->
  <circle cx="84" cy="295" r="10" fill="#5eead4"/>
  <text x="82" y="300"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-weight="700"
        font-size="12"
        fill="#0d2b27"
        text-anchor="middle">✓</text>
  <text x="106" y="301"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="18"
        fill="white">Nóminas &amp; Planillas automatizadas</text>

  <!-- Feature 2 — y=327 -->
  <circle cx="84" cy="337" r="10" fill="#5eead4"/>
  <text x="82" y="342"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-weight="700"
        font-size="12"
        fill="#0d2b27"
        text-anchor="middle">✓</text>
  <text x="106" y="343"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="18"
        fill="white">Control de Asistencia con IA</text>

  <!-- Feature 3 — y=369 -->
  <circle cx="84" cy="379" r="10" fill="#5eead4"/>
  <text x="82" y="384"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-weight="700"
        font-size="12"
        fill="#0d2b27"
        text-anchor="middle">✓</text>
  <text x="106" y="385"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="18"
        fill="white">Portal del Colaborador</text>

  <!-- Feature 4 — y=411 -->
  <circle cx="84" cy="421" r="10" fill="#5eead4"/>
  <text x="82" y="426"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-weight="700"
        font-size="12"
        fill="#0d2b27"
        text-anchor="middle">✓</text>
  <text x="106" y="427"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="18"
        fill="white">Reportes y Analytics en tiempo real</text>

  <!-- CTA Button -->
  <rect x="70" y="476" width="240" height="50" rx="25" fill="#5eead4"/>
  <text x="190" y="507"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-weight="700"
        font-size="17"
        fill="#0d2b27"
        text-anchor="middle">Solicita una Demo →</text>

  <!-- ================================================================ -->
  <!--  RIGHT VISUAL (center around x=930)                               -->
  <!-- ================================================================ -->

  <!-- Decorative teal glow circle behind logo -->
  <circle cx="930" cy="280" r="160" fill="url(#logoGlow)" opacity="0.6"/>

  <!-- Outer decorative ring -->
  <circle cx="930" cy="280" r="130" fill="none" stroke="#5eead4" stroke-width="1" opacity="0.15" stroke-dasharray="8,6"/>
  <circle cx="930" cy="280" r="108" fill="none" stroke="#5eead4" stroke-width="0.5" opacity="0.10"/>

  <!-- Logo circle background -->
  <circle cx="930" cy="280" r="90" fill="url(#logoBg)" stroke="#5eead4" stroke-width="1.5" opacity="1"/>
  <circle cx="930" cy="280" r="90" fill="none" stroke="#5eead4" stroke-width="1.5" opacity="0.5"/>

  <!-- H LOGO MARK scaled 160x160, centered at 930,280 (origin offset: 930-80=850, 280-80=200) -->
  <g transform="translate(850, 200)">
    <!-- Scale factor: 160/80 = 2x. Original H fits in 40x80 box. Center: 20,40 -->
    <!-- Left stem: original rect x=0 y=10 w=12 h=60 → scaled x2 -->
    <rect x="0"  y="20" width="24" height="120" rx="4" fill="white" opacity="0.95"/>
    <!-- Right stem -->
    <rect x="56" y="20" width="24" height="120" rx="4" fill="white" opacity="0.95"/>
    <!-- Cyan arc (smile) -->
    <path d="M 20,68 Q 40,94 60,68"
          stroke="#5eead4"
          stroke-width="8"
          fill="none"
          stroke-linecap="round"
          filter="url(#arcGlow)"/>
  </g>

  <!-- "harmoni.pe" below logo -->
  <text x="930" y="405"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="20"
        font-weight="600"
        fill="#5eead4"
        text-anchor="middle"
        letter-spacing="1">harmoni.pe</text>

  <!-- Tagline below domain -->
  <text x="930" y="432"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="13"
        fill="rgba(255,255,255,0.55)"
        text-anchor="middle"
        font-style="italic">Gestión de personas, en armonía</text>

  <!-- ================================================================ -->
  <!--  BOTTOM STRIP                                                      -->
  <!-- ================================================================ -->
  <rect x="0" y="570" width="1200" height="60" fill="#0a1f1c"/>

  <!-- Thin top border on strip -->
  <rect x="0" y="570" width="1200" height="2" fill="#5eead4" opacity="0.4"/>

  <!-- Center text in strip -->
  <text x="600" y="606"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="15"
        fill="rgba(255,255,255,0.85)"
        text-anchor="middle"
        letter-spacing="1">harmoni.pe  |  RRHH &amp; Planillas  |  Perú</text>
</svg>
