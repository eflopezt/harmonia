<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <!-- Full-height background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d2b27"/>
      <stop offset="50%"  stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>

    <!-- CTA button gradient -->
    <linearGradient id="ctaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>

    <!-- Card subtle gradient -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1a3d38"/>
      <stop offset="100%" stop-color="#163530"/>
    </linearGradient>

    <!-- Feature card highlight -->
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>

    <!-- White dots pattern -->
    <pattern id="dotPattern" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="1.5" fill="white" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- ========== BACKGROUND ========== -->
  <rect width="1080" height="1920" fill="url(#bgGrad)"/>
  <rect width="1080" height="1920" fill="url(#dotPattern)"/>

  <!-- ========== DECORATIVE ELEMENTS ========== -->
  <!-- Large decorative circle top-right -->
  <circle cx="900" cy="300" r="420" stroke="#5eead4" stroke-width="3" opacity="0.07" fill="none"/>
  <circle cx="900" cy="300" r="350" stroke="#5eead4" stroke-width="3" opacity="0.10" fill="none"/>
  <circle cx="900" cy="300" r="260" stroke="#5eead4" stroke-width="2" opacity="0.06" fill="none"/>

  <!-- Smaller circle bottom-left -->
  <circle cx="180" cy="1600" r="260" stroke="#5eead4" stroke-width="2.5" opacity="0.08" fill="none"/>
  <circle cx="180" cy="1600" r="180" stroke="#5eead4" stroke-width="2"   opacity="0.05" fill="none"/>

  <!-- Curvy decorative diagonal sweep -->
  <path d="M 1080 0 Q 700 500 400 960 Q 100 1420 0 1920"
        stroke="#5eead4" stroke-width="80" fill="none" opacity="0.04" stroke-linecap="round"/>

  <!-- Secondary subtle arc -->
  <path d="M 1080 200 Q 600 700 200 1400"
        stroke="#5eead4" stroke-width="2" fill="none" opacity="0.12" stroke-linecap="round"/>

  <!-- ========== TOP SECTION ========== -->

  <!-- Glow behind logo -->
  <circle cx="540" cy="198" r="110" fill="#5eead4" opacity="0.05"/>
  <circle cx="540" cy="198" r="84"  fill="#0f766e" opacity="0.20"/>

  <!-- H LOGOMARK (160x160 centered at x=540 y=120) -->
  <!-- Left vertical bar -->
  <rect x="472" y="132" width="28" height="136" rx="5" fill="white"/>
  <!-- Right vertical bar -->
  <rect x="580" y="132" width="28" height="136" rx="5" fill="white"/>
  <!-- Cyan arc (smile) -->
  <path d="M 462 199 Q 540 225 618 199" stroke="#5eead4" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.97"/>

  <!-- "Harmoni" -->
  <text x="540" y="350"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="96" font-weight="900" fill="white"
        text-anchor="middle" letter-spacing="-3">Harmoni</text>

  <!-- "ERP de RRHH &amp; Planillas" -->
  <text x="540" y="405"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="28" font-weight="500" fill="#5eead4"
        text-anchor="middle" letter-spacing="1">ERP de RRHH &amp; Planillas</text>

  <!-- Cyan underline under Harmoni text -->
  <rect x="350" y="362" width="380" height="5" rx="2.5" fill="#5eead4" opacity="0.7"/>

  <!-- Divider -->
  <line x1="90" y1="448" x2="990" y2="448" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <!-- ========== MIDDLE SECTION ========== -->

  <!-- Section title -->
  <text x="540" y="504"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="34" font-weight="700" fill="white"
        text-anchor="middle">¿Por qué Harmoni?</text>

  <!-- Cyan underline under section title -->
  <rect x="380" y="515" width="320" height="4" rx="2" fill="#5eead4" opacity="0.8"/>

  <!-- ===== FEATURE CARDS ===== -->
  <!-- Card positions: y = 548, 708, 868, 1028, 1188 (160px apart) -->

  <!-- CARD 1: IA Integrada (y=548) -->
  <rect x="90" y="548" width="900" height="140" rx="16" fill="url(#cardGrad)"/>
  <rect x="90" y="548" width="900" height="140" rx="16" fill="none" stroke="#5eead4" stroke-width="1" opacity="0.18"/>
  <!-- Icon circle -->
  <circle cx="162" cy="618" r="36" fill="url(#iconGrad)" opacity="0.25"/>
  <circle cx="162" cy="618" r="28" fill="#5eead4" opacity="0.15"/>
  <text x="162" y="628" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" fill="#5eead4">🤖</text>
  <!-- Feature text -->
  <text x="218" y="604"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="24" font-weight="700" fill="white">IA Integrada</text>
  <text x="218" y="634"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="18" fill="rgba(255,255,255,0.70)">Asistente IA para RRHH en tiempo real</text>
  <!-- Accent bar -->
  <rect x="90" y="548" width="5" height="140" rx="2.5" fill="#5eead4" opacity="0.7"/>

  <!-- CARD 2: Analytics (y=708) -->
  <rect x="90" y="708" width="900" height="140" rx="16" fill="url(#cardGrad)"/>
  <rect x="90" y="708" width="900" height="140" rx="16" fill="none" stroke="#5eead4" stroke-width="1" opacity="0.18"/>
  <circle cx="162" cy="778" r="36" fill="url(#iconGrad)" opacity="0.25"/>
  <circle cx="162" cy="778" r="28" fill="#5eead4" opacity="0.15"/>
  <text x="162" y="788" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" fill="#5eead4">📊</text>
  <text x="218" y="764"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="24" font-weight="700" fill="white">Analytics</text>
  <text x="218" y="794"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="18" fill="rgba(255,255,255,0.70)">KPIs y dashboards ejecutivos</text>
  <rect x="90" y="708" width="5" height="140" rx="2.5" fill="#5eead4" opacity="0.7"/>

  <!-- CARD 3: Nóminas (y=868) -->
  <rect x="90" y="868" width="900" height="140" rx="16" fill="url(#cardGrad)"/>
  <rect x="90" y="868" width="900" height="140" rx="16" fill="none" stroke="#5eead4" stroke-width="1" opacity="0.18"/>
  <circle cx="162" cy="938" r="36" fill="url(#iconGrad)" opacity="0.25"/>
  <circle cx="162" cy="938" r="28" fill="#5eead4" opacity="0.15"/>
  <text x="162" y="948" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" fill="#5eead4">💰</text>
  <text x="218" y="924"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="24" font-weight="700" fill="white">Nóminas</text>
  <text x="218" y="954"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="18" fill="rgba(255,255,255,0.70)">Cálculo automático IGV, AFP, ONP</text>
  <rect x="90" y="868" width="5" height="140" rx="2.5" fill="#5eead4" opacity="0.7"/>

  <!-- CARD 4: Portal (y=1028) -->
  <rect x="90" y="1028" width="900" height="140" rx="16" fill="url(#cardGrad)"/>
  <rect x="90" y="1028" width="900" height="140" rx="16" fill="none" stroke="#5eead4" stroke-width="1" opacity="0.18"/>
  <circle cx="162" cy="1098" r="36" fill="url(#iconGrad)" opacity="0.25"/>
  <circle cx="162" cy="1098" r="28" fill="#5eead4" opacity="0.15"/>
  <text x="162" y="1108" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" fill="#5eead4">🏠</text>
  <text x="218" y="1084"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="24" font-weight="700" fill="white">Portal</text>
  <text x="218" y="1114"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="18" fill="rgba(255,255,255,0.70)">Intranet para colaboradores</text>
  <rect x="90" y="1028" width="5" height="140" rx="2.5" fill="#5eead4" opacity="0.7"/>

  <!-- CARD 5: Contratos (y=1188) -->
  <rect x="90" y="1188" width="900" height="140" rx="16" fill="url(#cardGrad)"/>
  <rect x="90" y="1188" width="900" height="140" rx="16" fill="none" stroke="#5eead4" stroke-width="1" opacity="0.18"/>
  <circle cx="162" cy="1258" r="36" fill="url(#iconGrad)" opacity="0.25"/>
  <circle cx="162" cy="1258" r="28" fill="#5eead4" opacity="0.15"/>
  <text x="162" y="1268" font-family="Arial, sans-serif" font-size="26" text-anchor="middle" fill="#5eead4">📋</text>
  <text x="218" y="1244"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="24" font-weight="700" fill="white">Contratos</text>
  <text x="218" y="1274"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="18" fill="rgba(255,255,255,0.70)">Gestión documental completa</text>
  <rect x="90" y="1188" width="5" height="140" rx="2.5" fill="#5eead4" opacity="0.7"/>

  <!-- ========== TRUST BADGES (y=1380) ========== -->
  <line x1="90" y1="1370" x2="990" y2="1370" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <text x="540" y="1416"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="18" fill="rgba(255,255,255,0.45)" text-anchor="middle"
        letter-spacing="3">NORMATIVA PERUANA · SUNAT · ESSALUD</text>

  <!-- Three mini badges -->
  <rect x="130" y="1438" width="230" height="52" rx="26" fill="rgba(94,234,212,0.08)" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
  <text x="245" y="1470" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="600" fill="#5eead4" text-anchor="middle">UIT S/ 5,500</text>

  <rect x="425" y="1438" width="230" height="52" rx="26" fill="rgba(94,234,212,0.08)" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
  <text x="540" y="1470" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="600" fill="#5eead4" text-anchor="middle">RMV S/ 1,130</text>

  <rect x="720" y="1438" width="230" height="52" rx="26" fill="rgba(94,234,212,0.08)" stroke="#5eead4" stroke-width="1" opacity="0.5"/>
  <text x="835" y="1470" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="15" font-weight="600" fill="#5eead4" text-anchor="middle">5ta Categoría</text>

  <!-- ========== BOTTOM SECTION ========== -->

  <!-- Decorative separator -->
  <line x1="90" y1="1545" x2="990" y2="1545" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <!-- Tagline above CTA -->
  <text x="540" y="1580"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="22" font-style="italic" fill="rgba(255,255,255,0.75)"
        text-anchor="middle">Gestión de personas, en armonía</text>

  <!-- BIG CTA BLOCK (y=1600) -->
  <rect x="90" y="1600" width="900" height="180" rx="20" fill="url(#ctaGrad)"/>
  <!-- Inner shadow / depth effect -->
  <rect x="90" y="1600" width="900" height="180" rx="20" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>
  <!-- Subtle inner highlight top -->
  <rect x="90" y="1600" width="900" height="60" rx="20" fill="white" opacity="0.05"/>

  <!-- CTA text -->
  <text x="540" y="1667"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="38" font-weight="800" fill="white"
        text-anchor="middle" letter-spacing="-1">Solicita tu Demo Gratis</text>

  <text x="540" y="1718"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="24" font-weight="600" fill="rgba(255,255,255,0.90)"
        text-anchor="middle">harmoni.pe</text>

  <!-- Arrow decoration on CTA -->
  <text x="870" y="1698" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.5)" text-anchor="middle">→</text>

  <!-- Bottom handle bar (Instagram safe zone) -->
  <rect x="440" y="1830" width="200" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>

  <!-- Bottom social handle -->
  <text x="540" y="1880"
        font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="18" font-weight="400" fill="rgba(255,255,255,0.50)"
        text-anchor="middle">@harmoni_erp</text>
</svg>
