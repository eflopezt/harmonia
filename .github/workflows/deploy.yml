# =============================================================================
# Harmoni ERP — CI/CD Pipeline (push to main)
# Lint + Test + Deploy to VPS
# =============================================================================
name: Deploy

on:
  workflow_dispatch:  # Solo manual, no en cada push

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: config.settings.development

jobs:
  # -------------------------------------------
  # Job 1: Lint
  # -------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/development.txt

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  # -------------------------------------------
  # Job 2: Tests
  # -------------------------------------------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements/development.txt

      - name: Install dependencies
        run: pip install -r requirements/development.txt

      - name: Run tests
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DATABASE_URL: "sqlite:///db_test.sqlite3"
        run: pytest --tb=short -q

  # -------------------------------------------
  # Job 3: Deploy to VPS (only after tests pass)
  # -------------------------------------------
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Create deploy tarball
        run: |
          tar czf /tmp/harmoni-deploy.tar.gz \
            --exclude='.git' --exclude='venv' --exclude='__pycache__' \
            --exclude='*.pyc' --exclude='db.sqlite3' --exclude='staticfiles' \
            --exclude='logs' --exclude='.env' --exclude='node_modules' \
            --exclude='.venv' --exclude='.claude' --exclude='media' \
            --exclude='htmlcov' --exclude='.coverage' \
            .

      - name: Upload to VPS
        run: |
          scp /tmp/harmoni-deploy.tar.gz ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/harmoni-deploy.tar.gz

      - name: Deploy on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} 'bash -s' << 'REMOTE'
          set -e
          cd /opt/harmoni/app

          # Preserve production configs
          cp .env.production /tmp/harmoni-env-backup 2>/dev/null || true
          cp docker-compose.prod.yml /tmp/harmoni-compose-backup 2>/dev/null || true

          # Extract new code
          tar xzf /tmp/harmoni-deploy.tar.gz
          rm /tmp/harmoni-deploy.tar.gz

          # Restore production configs
          cp /tmp/harmoni-env-backup .env.production 2>/dev/null || true
          cp /tmp/harmoni-compose-backup docker-compose.prod.yml 2>/dev/null || true

          # Fix permissions
          chown -R deploy:deploy /opt/harmoni/app

          # Build, migrate, collectstatic, restart
          COMPOSE_PROJECT_NAME=harmoni docker compose -f docker-compose.prod.yml build web
          COMPOSE_PROJECT_NAME=harmoni docker compose -f docker-compose.prod.yml run --rm web python manage.py migrate --noinput
          COMPOSE_PROJECT_NAME=harmoni docker compose -f docker-compose.prod.yml run --rm \
            -v /opt/harmoni/staticfiles:/app/staticfiles web python manage.py collectstatic --noinput
          chmod -R 777 /opt/harmoni/staticfiles
          COMPOSE_PROJECT_NAME=harmoni docker compose -f docker-compose.prod.yml up -d --force-recreate
          REMOTE

      - name: Verify deployment
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "docker ps --format 'table {{.Names}}\t{{.Status}}' | grep harmoni"
