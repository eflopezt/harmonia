services:
  - type: web
    name: harmoni
    env: python
    region: oregon
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-file - --log-level info"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_ALLOWED_HOSTS
        fromService:
          name: harmoni
          type: web
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: harmoni-db
          property: connectionString
    healthCheckPath: /health/
    # Keep-alive: Render free tier duerme tras 15min inactividad.
    # Configurar UptimeRobot (gratis) para pingear https://harmoni.pe/health/ cada 5 min.

databases:
  - name: harmoni-db
    databaseName: harmoni
    user: harmoni
    plan: free
