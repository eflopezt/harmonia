{% extends "base.html" %}

{% block title %}Nueva Capacitación{% endblock %}

{% block content %}
<h2 class="mb-3"><i class="fas fa-chalkboard-teacher text-secondary me-2"></i>{{ titulo }}</h2>

<div class="card shadow-sm" style="max-width:700px;">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Título</label>
                <input type="text" name="titulo" class="form-control" required>
            </div>
            <div class="row">
                <div class="col-6 mb-3">
                    <label class="form-label">Tipo</label>
                    <select name="tipo" class="form-select">
                        <option value="INTERNA">Interna</option>
                        <option value="EXTERNA">Externa</option>
                        <option value="ELEARNING">E-Learning</option>
                        <option value="SSOMA">SSOMA</option>
                        <option value="INDUCCION">Inducción</option>
                    </select>
                </div>
                <div class="col-6 mb-3">
                    <label class="form-label">Categoría</label>
                    <select name="categoria_id" class="form-select">
                        <option value="">Sin categoría</option>
                        {% for c in categorias %}
                        <option value="{{ c.pk }}">{{ c.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Instructor / Proveedor</label>
                <input type="text" name="instructor" class="form-control">
            </div>
            <div class="row">
                <div class="col-4 mb-3">
                    <label class="form-label">Fecha Inicio</label>
                    <input type="date" name="fecha_inicio" class="form-control" required>
                </div>
                <div class="col-4 mb-3">
                    <label class="form-label">Fecha Fin</label>
                    <input type="date" name="fecha_fin" class="form-control">
                </div>
                <div class="col-4 mb-3">
                    <label class="form-label">Horas</label>
                    <input type="number" name="horas" class="form-control" step="0.5" min="0.5" value="1" required>
                </div>
            </div>
            <div class="row">
                <div class="col-4 mb-3">
                    <label class="form-label">Lugar</label>
                    <input type="text" name="lugar" class="form-control">
                </div>
                <div class="col-4 mb-3">
                    <label class="form-label">Costo (S/)</label>
                    <input type="number" name="costo" class="form-control" step="0.01" value="0">
                </div>
                <div class="col-4 mb-3">
                    <label class="form-label">Máx. Participantes</label>
                    <input type="number" name="max_participantes" class="form-control" value="0">
                    <small class="text-muted">0 = sin límite</small>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="2"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Material (archivo)</label>
                <input type="file" name="material" class="form-control">
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="obligatoria" class="form-check-input" id="obligatoria">
                <label class="form-check-label" for="obligatoria">Capacitación obligatoria</label>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Crear</button>
                <a href="{% url 'capacitaciones_panel' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
