{% extends "base.html" %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="container py-4" style="max-width:600px">
  <h1 class="h3 fw-bold mb-4"><i class="fas fa-building me-2 text-teal"></i>{{ titulo }}</h1>

  <div class="card">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label fw-semibold">RUC <span class="text-danger">*</span></label>
            <input type="text" name="ruc" value="{{ empresa.ruc|default:'' }}" class="form-control"
              maxlength="11" required placeholder="20XXXXXXXXX">
          </div>
          <div class="col-md-8">
            <label class="form-label fw-semibold">Razón Social <span class="text-danger">*</span></label>
            <input type="text" name="razon_social" value="{{ empresa.razon_social|default:'' }}"
              class="form-control" required>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Nombre Comercial</label>
            <input type="text" name="nombre_comercial" value="{{ empresa.nombre_comercial|default:'' }}"
              class="form-control" placeholder="Si es diferente a la razón social">
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Dirección</label>
            <input type="text" name="direccion" value="{{ empresa.direccion|default:'' }}" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Teléfono</label>
            <input type="text" name="telefono" value="{{ empresa.telefono|default:'' }}" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Email RRHH</label>
            <input type="email" name="email_rrhh" value="{{ empresa.email_rrhh|default:'' }}" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Régimen Laboral</label>
            <select name="regimen_laboral" class="form-select">
              {% for val, label in regimen_choices %}
              <option value="{{ val }}" {% if empresa.regimen_laboral == val %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-3 d-flex align-items-end">
            <div class="form-check mb-2">
              <input type="checkbox" name="es_principal" value="1" class="form-check-input"
                id="esPrincipal" {% if empresa.es_principal %}checked{% endif %}>
              <label class="form-check-label" for="esPrincipal">Empresa principal</label>
            </div>
          </div>
          <div class="col-md-3 d-flex align-items-end">
            <div class="form-check mb-2">
              <input type="checkbox" name="activa" value="1" class="form-check-input"
                id="activa" {% if empresa.activa or action == 'crear' %}checked{% endif %}>
              <label class="form-check-label" for="activa">Activa</label>
            </div>
          </div>
        </div>

        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save me-1"></i>Guardar
          </button>
          <a href="{% url 'empresas_panel' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
