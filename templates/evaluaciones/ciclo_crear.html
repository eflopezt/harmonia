{% extends "base.html" %}

{% block title %}Nuevo Ciclo de Evaluación{% endblock %}

{% block content %}
<div class="mb-3">
    <h2 class="mb-0"><i class="fas fa-star-half-alt text-secondary me-2"></i>{{ titulo }}</h2>
</div>

<div class="row">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Nombre del Ciclo *</label>
                        <input type="text" name="nombre" class="form-control" required placeholder="Ej: Evaluación Anual 2026">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tipo *</label>
                            <select name="tipo" class="form-select" required>
                                <option value="90">Evaluación 90° (Jefe)</option>
                                <option value="180" selected>Evaluación 180° (Jefe + Auto)</option>
                                <option value="360">Evaluación 360°</option>
                                <option value="OKR">Revisión OKR</option>
                                <option value="PRUEBA">Evaluación Periodo de Prueba</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Plantilla</label>
                            <select name="plantilla_id" class="form-select">
                                <option value="">Sin plantilla</option>
                                {% for p in plantillas %}
                                <option value="{{ p.pk }}">{{ p.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha Inicio *</label>
                            <input type="date" name="fecha_inicio" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha Fin *</label>
                            <input type="date" name="fecha_fin" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Crear Ciclo</button>
                        <a href="{% url 'ciclos_panel' %}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
