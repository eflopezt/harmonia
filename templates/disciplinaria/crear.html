{% extends "base.html" %}

{% block title %}Nueva Medida Disciplinaria{% endblock %}

{% block content %}
<h2 class="mb-3"><i class="fas fa-gavel text-secondary me-2"></i>{{ titulo }}</h2>

<div class="card shadow-sm" style="max-width:700px;">
    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Trabajador</label>
                <select name="personal_id" class="form-select" required>
                    <option value="">Seleccionar...</option>
                    {% for p in personal_list %}
                    <option value="{{ p.pk }}">{{ p.apellidos_nombres }} ({{ p.nro_doc }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="row">
                <div class="col-6 mb-3">
                    <label class="form-label">Tipo de Medida</label>
                    <select name="tipo_medida" class="form-select" required>
                        <option value="VERBAL">Amonestación Verbal</option>
                        <option value="ESCRITA">Amonestación Escrita</option>
                        <option value="SUSPENSION">Suspensión</option>
                        <option value="DESPIDO">Despido</option>
                    </select>
                </div>
                <div class="col-6 mb-3">
                    <label class="form-label">Tipo de Falta</label>
                    <select name="tipo_falta_id" class="form-select" required>
                        <option value="">Seleccionar...</option>
                        {% for t in tipos_falta %}
                        <option value="{{ t.pk }}">{{ t.nombre }} ({{ t.get_gravedad_display }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Fecha de los Hechos</label>
                <input type="date" name="fecha_hechos" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Descripción de los Hechos</label>
                <textarea name="descripcion" class="form-control" rows="4" required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Testigos</label>
                <textarea name="testigos" class="form-control" rows="2" placeholder="Nombres de testigos presenciales..."></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Evidencias (archivo)</label>
                <input type="file" name="evidencias" class="form-control">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Registrar</button>
                <a href="{% url 'disciplinaria_panel' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<div class="mt-3">
    <small class="text-muted"><i class="fas fa-balance-scale me-1"></i>Base legal: DS 003-97-TR Art. 24-28 (faltas graves), Art. 31 (procedimiento de despido — 6 días hábiles para descargo).</small>
</div>
{% endblock %}
