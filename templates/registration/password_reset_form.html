<!DOCTYPE html>
<html lang="es">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña — Harmoni</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">
    <link rel="apple-touch-icon" sizes="192x192" href="{% static 'images/icon-192.png' %}">
    <meta name="theme-color" content="#0f766e">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/harmoni.css' %}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-mark">
                <svg width="48" height="48" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <defs>
                    <linearGradient id="lg-wv" x1="0%" y1="0%" x2="100%" y2="0%">
                      <stop offset="0%"  stop-color="#084e47"/>
                      <stop offset="30%" stop-color="#0d9488"/>
                      <stop offset="50%" stop-color="#5eead4"/>
                      <stop offset="70%" stop-color="#0d9488"/>
                      <stop offset="100%" stop-color="#084e47"/>
                    </linearGradient>
                  </defs>
                  <path d="M 3,22 C 9,28 16,14 20,21 C 24,28 31,14 37,20"
                        stroke="url(#lg-wv)" stroke-width="3.2" fill="none" stroke-linecap="round"/>
                  <rect x="7"  y="5" width="7" height="28" rx="3.5" fill="white"/>
                  <rect x="26" y="5" width="7" height="28" rx="3.5" fill="white"/>
                </svg>
            </div>
            <h1>Harmoni</h1>
            <p>Recuperar contraseña</p>
        </div>

        <p class="text-muted text-center mb-4 small">
            Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
        </p>

        <form method="post" class="auth-form">
            {% csrf_token %}
            <div class="mb-4">
                <label for="id_email" class="form-label">
                    <i class="fas fa-envelope me-1 text-muted"></i> Correo electrónico
                </label>
                <input type="email" name="email" id="id_email"
                       class="form-control" placeholder="tu@correo.com"
                       required autofocus autocomplete="email">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="fas fa-paper-plane me-2"></i>Enviar enlace de recuperación
            </button>
        </form>

        <div class="auth-links mt-3 text-center">
            <a href="{% url 'login' %}" class="text-muted">
                <i class="fas fa-arrow-left me-1"></i>Volver al inicio de sesión
            </a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
