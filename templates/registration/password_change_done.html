<!DOCTYPE html>
<html lang="es">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña Actualizada — Harmoni</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/harmoni.css' %}">
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card text-center">

        <div style="margin-bottom:1.5rem">
            <div style="width:72px;height:72px;border-radius:50%;background:rgba(16,185,129,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
                <i class="fas fa-check-circle" style="font-size:2rem;color:#10b981"></i>
            </div>
            <h1 style="font-size:1.5rem;font-weight:700;color:#0f172a">¡Contraseña actualizada!</h1>
            <p class="text-muted" style="font-size:.9rem;margin-top:.5rem">
                Tu contraseña ha sido cambiada exitosamente.
            </p>
        </div>

        <a href="{% url 'home' %}" class="btn btn-primary w-100 py-2">
            <i class="fas fa-home me-2"></i>Volver al Dashboard
        </a>

        <div class="auth-footer">
            <span class="text-muted">Harmoni ERP · Sistema de RRHH</span>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
