<!DOCTYPE html>
<html lang="es">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo Enviado — Harmoni</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">
    <link rel="apple-touch-icon" sizes="192x192" href="{% static 'images/icon-192.png' %}">
    <meta name="theme-color" content="#0f766e">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/harmoni.css' %}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card text-center">
        <div class="mb-3">
            <span style="font-size:3rem;color:#0d9488;"><i class="fas fa-envelope-circle-check"></i></span>
        </div>
        <h2 class="fw-semibold mb-2">¡Correo enviado!</h2>
        <p class="text-muted mb-4">
            Si el correo está registrado en el sistema, recibirás un enlace para restablecer tu contraseña en los próximos minutos.
        </p>
        <p class="text-muted small">Revisa también tu carpeta de spam si no lo encuentras.</p>
        <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2 mt-3">
            <i class="fas fa-arrow-left me-2"></i>Volver al inicio de sesión
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
