<!DOCTYPE html>
<html lang="es">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña Restablecida — Harmoni</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/harmoni.css' %}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card text-center">
        <div class="mb-3">
            <span style="font-size:3rem;color:#0d9488;"><i class="fas fa-circle-check"></i></span>
        </div>
        <h2 class="fw-semibold mb-2">¡Contraseña actualizada!</h2>
        <p class="text-muted mb-4">Tu contraseña ha sido restablecida exitosamente. Ya puedes iniciar sesión con tu nueva contraseña.</p>
        <a href="{% url 'login' %}" class="btn btn-primary w-100 py-2">
            <i class="fas fa-sign-in-alt me-2"></i>Iniciar sesión
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
