{% extends 'base.html' %}

{% block title %}Nuevo documento para firma - Harmoni{% endblock %}

{% block content %}
<div class='container py-4' style='max-width:700px'><h1 class='h3 fw-bold mb-4'><i class='fas fa-signature me-2 text-teal'></i>Nuevo documento para firma</h1>
<div class='card'><div class='card-body'><form method='post' enctype='multipart/form-data'>{% csrf_token %}
<div class='mb-3'><label class='form-label fw-semibold'>Trabajador <span class='text-danger'>*</span></label>
<select name='personal_id' class='form-select' required><option value=''>Seleccionar trabajador...</option>
{% for p in personal_list %}<option value='{{ p.pk }}'>{{ p.apellidos_nombres }} - {{ p.nro_doc }}</option>{% endfor %}</select></div>
<div class='mb-3'><label class='form-label fw-semibold'>Nombre del documento <span class='text-danger'>*</span></label>
<input type='text' name='nombre' class='form-control' required placeholder='Ej: Contrato de Trabajo - Enero 2026'></div>
<div class='row g-3 mb-3'><div class='col-md-6'><label class='form-label fw-semibold'>Tipo</label>
<select name='tipo' class='form-select'>{% for val, label in tipo_choices %}<option value='{{ val }}'>{{ label }}</option>{% endfor %}</select></div>
<div class='col-md-6'><label class='form-label fw-semibold'>Dias para firmar</label>
<input type='number' name='dias_expiracion' class='form-control' value='30' min='1' max='365'></div></div>
<div class='mb-3'><label class='form-label fw-semibold'>Descripcion</label>
<textarea name='descripcion' class='form-control' rows='2' placeholder='Opcional...'></textarea></div>
<div class='mb-4'><label class='form-label fw-semibold'>Archivo PDF <span class='text-danger'>*</span></label>
<input type='file' name='archivo_pdf' class='form-control' accept='.pdf' required>
<div class='form-text'>Solo archivos PDF. El link de firma sera enviado al correo del trabajador.</div></div>
<div class='mb-4 form-check'><input type='checkbox' name='enviar_ahora' value='1' class='form-check-input' id='enviarAhora' checked>
<label class='form-check-label' for='enviarAhora'>Enviar a ZapSign ahora (el trabajador recibira email para firmar)</label></div>
<div class='d-flex gap-2'><button type='submit' class='btn btn-primary'><i class='fas fa-save me-1'></i>Guardar</button>
<a href='{% url 'firma_panel' %}' class='btn btn-outline-secondary'>Cancelar</a></div>
</form></div></div></div>
{% endblock %}
