# Nginx config for harmoni.pe
# Works behind Cloudflare proxy (Full Strict SSL)
# Certbot manages SSL certs on origin server

upstream harmoni_app {
    server 127.0.0.1:8000;
}

# Redirect www to non-www
server {
    listen 80;
    server_name www.harmoni.pe;
    return 301 https://harmoni.pe$request_uri;
}

server {
    listen 80;
    server_name harmoni.pe;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS block
server {
    listen 443 ssl http2;
    server_name harmoni.pe www.harmoni.pe;

    # Certbot will fill these:
    # ssl_certificate /etc/letsencrypt/live/harmoni.pe/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/harmoni.pe/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Tamaño máximo de upload (para PDFs, Excel, imágenes)
    client_max_body_size 50M;

    # Timeouts para SSE streaming (AI chat)
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
    proxy_send_timeout 300s;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Static files (WhiteNoise handles these, but nginx is faster)
    location /static/ {
        alias /opt/harmoni/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files (uploads)
    location /media/ {
        alias /opt/harmoni/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # SSE streaming endpoint (AI chat) - necesita config especial
    location /asistencia/ia/chat/ {
        proxy_pass http://harmoni_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE specific
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
    }

    # Django app
    location / {
        proxy_pass http://harmoni_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
