# =============================================================================
# Redis 7 — Optimizado para VPS con 2 apps Django
# Ubicación: /etc/redis/redis.conf (o incluir como override)
# =============================================================================

# ── Binding ──
bind 127.0.0.1 ::1
port 6379

# ── Autenticación (configurar password en el servidor, no en repo) ──
# requirepass CONFIGURAR_EN_SERVIDOR

# ── Memoria ──
maxmemory 512mb
maxmemory-policy allkeys-lru

# ── Persistencia (ligera para VPS) ──
save 900 1
save 300 10
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum no
appendonly no

# ── Rendimiento ──
tcp-backlog 511
tcp-keepalive 300
timeout 300

# ── Desfragmentación activa ──
activedefrag yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes

# ── Conexiones ──
maxclients 256

# ── Systemd ──
supervised systemd

# ── LFU (para allkeys-lru más inteligente) ──
lfu-log-factor 10
lfu-decay-time 1
